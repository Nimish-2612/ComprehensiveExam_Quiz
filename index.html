<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Application</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="quiz-container">

<div class="header">
<h1>Comprehensive Quiz</h1>

<div class="score">
Score: <span id="score">0</span> /
<span id="total"></span>
</div>
</div>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<div id="quiz">

<div class="question-number">
Question <span id="current-question"></span>
</div>

<div id="question-container">

<div id="question" class="question"></div>

<img id="question-image" />

</div>

<div id="options" class="options"></div>

<div class="navigation">
<button id="prev-btn">Previous</button>
<button id="next-btn">Next</button>
</div>

</div>

<div id="result" class="result-container">

<h2>Quiz Completed</h2>

<p>Your Score: <span id="final-score"></span></p>

<button id="restart-btn">Restart Quiz</button>

</div>

</div>

<script src="questions_compreh.js"></script>

<script>

let quiz = [...quizData];

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

quiz = shuffle(quiz);

let current = 0;
let score = 0;

let answered = new Array(quiz.length).fill(false);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const imageEl = document.getElementById("question-image");

const scoreEl = document.getElementById("score");
const totalEl = document.getElementById("total");

const currentQ = document.getElementById("current-question");

const progress = document.getElementById("progress");

const prevBtn = document.getElementById("prev-btn");
const nextBtn = document.getElementById("next-btn");

const quizEl = document.getElementById("quiz");
const resultEl = document.getElementById("result");

const finalScore = document.getElementById("final-score");

totalEl.textContent = quiz.length;

function loadQuestion(){

let q = quiz[current];

questionEl.textContent =
q.question && q.question.trim() !== ""
? q.question
: "Refer to the options below";

if(q.image){
imageEl.src = q.image;
imageEl.style.display="block";
}else{
imageEl.style.display="none";
}

optionsEl.innerHTML="";

q.options.forEach((opt,i)=>{

if(!opt) return;

let div=document.createElement("div");

div.className="option";

div.textContent=opt;

if(!answered[current]){

div.onclick=()=>selectOption(div,i);

}

optionsEl.appendChild(div);

});

currentQ.textContent = current+1;

progress.style.width = ((current+1)/quiz.length)*100+"%";

prevBtn.disabled = current===0;

nextBtn.textContent =
current===quiz.length-1
? "Finish"
: "Next";

}

function selectOption(el,index){

if(answered[current]) return;

let q=quiz[current];

let options=document.querySelectorAll(".option");

if(q.correctAnswer!==undefined){

if(index===q.correctAnswer){

el.classList.add("correct");

score++;

scoreEl.textContent=score;

}else{

el.classList.add("incorrect");

options[q.correctAnswer]?.classList.add("correct");

}

}

answered[current]=true;

}

function nextQuestion(){

if(current<quiz.length-1){

current++;

loadQuestion();

}else{

showResult();

}

}

function prevQuestion(){

if(current>0){

current--;

loadQuestion();

}

}

function showResult(){

quizEl.style.display="none";

resultEl.style.display="block";

finalScore.textContent = score + " / " + quiz.length;

}

function restart(){

quiz = shuffle([...quizData]);

current=0;

score=0;

answered = new Array(quiz.length).fill(false);

scoreEl.textContent=0;

quizEl.style.display="block";

resultEl.style.display="none";

loadQuestion();

}

nextBtn.onclick = nextQuestion;

prevBtn.onclick = prevQuestion;

document.getElementById("restart-btn").onclick = restart;

loadQuestion();

</script>

</body>
</html>
