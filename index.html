<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Learning & Data Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="quiz-container" id="quiz">
        <div class="scoreboard">
            <span class="score-badge correct-badge">Correct: <span id="correct-count">0</span></span>
            <span class="score-badge wrong-badge">Incorrect: <span id="wrong-count">0</span></span>
        </div>

        <div id="quiz-header">
            <h2 id="question">Question Text</h2>
            <div class="options-container" id="options">
                </div>
        </div>
        <div class="quiz-footer">
            <p id="progress">Question 1 of X</p>
            <button id="submit" class="hidden">Next Question</button>
        </div>
    </div>

    <div id="result-container" class="quiz-container hidden">
        <h2>Quiz Completed!</h2>
        <div class="final-stats">
            <p>Total Questions: <span id="total-q"></span></p>
            <p style="color: #28a745;">Total Correct: <span id="final-correct"></span></p>
            <p style="color: #dc3545;">Total Incorrect: <span id="final-wrong"></span></p>
        </div>
        <button onclick="location.reload()" style="margin-top: 20px;">Restart Quiz</button>
    </div>

    <script src="questions.js"></script>
    <script>
        let currentQuiz = 0;
        let correctScore = 0;
        let wrongScore = 0;

        const questionEl = document.getElementById('question');
        const optionsContainer = document.getElementById('options');
        const progressEl = document.getElementById('progress');
        const submitBtn = document.getElementById('submit');
        const quizDiv = document.getElementById('quiz');
        const resultDiv = document.getElementById('result-container');
        
        // Counter Elements
        const correctCountEl = document.getElementById('correct-count');
        const wrongCountEl = document.getElementById('wrong-count');

        loadQuiz();

        function loadQuiz() {
            const currentData = quizData[currentQuiz];
            questionEl.innerText = currentData.question;
            optionsContainer.innerHTML = '';

            currentData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option-btn');
                button.onclick = () => selectOption(index, button);
                optionsContainer.appendChild(button);
            });

            progressEl.innerText = `Question ${currentQuiz + 1} of ${quizData.length}`;
            submitBtn.classList.add('hidden');
        }

        function selectOption(selectedIndex, btn) {
            const correctIndex = parseInt(quizData[currentQuiz].correctAnswer);
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(button => button.disabled = true);

            if (selectedIndex === correctIndex) {
                btn.classList.add('correct');
                correctScore++;
                correctCountEl.innerText = correctScore;
            } else {
                btn.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
                wrongScore++;
                wrongCountEl.innerText = wrongScore;
            }
            submitBtn.classList.remove('hidden');
        }

        submitBtn.addEventListener('click', () => {
            currentQuiz++;
            if (currentQuiz < quizData.length) {
                loadQuiz();
            } else {
                showResults();
            }
        });

        function showResults() {
            quizDiv.classList.add('hidden');
            resultDiv.classList.remove('hidden');
            document.getElementById('total-q').innerText = quizData.length;
            document.getElementById('final-correct').innerText = correctScore;
            document.getElementById('final-wrong').innerText = wrongScore;
        }
    </script>
</body>
</html>
